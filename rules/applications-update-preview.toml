schema_version = 1
id = "applications-update-preview"
name = "Applications Update Preview"
category = { Other = "applications" }
risk = "Medium"
enabled = true

[match]
mode = "Command"
paths = []
strategy = "Shallow"
command = ["sh", "-lc", "echo preen-applications-update"]
parser = ""

[action]
action_type = "RunCommand"
paths = []
command = ["sh", "-lc", "echo preen-applications-update-action"]
mode = "Confirm"
timeout_sec = 60
allow_globs = false
max_items = 100
package_manager = ""
project_types = []
params = { smart_care_capability = "applications", smart_care_review_hint = "Review update candidates before apply" }
